name: Problem with the Rive Unity Runtime
description: Report a bug or unexpected behavior in the Rive Unity runtime.
body:
  - type: markdown
    attributes:
      value: |
        Thanks for using Rive! Before filing an issue, please:
        - Confirm if the issue is still present on the latest version of the [Rive Unity package](https://github.com/rive-app/rive-unity/releases). Also check the [latest tag](https://github.com/rive-app/rive-unity/tags).
        - Check the [Rive documentation](https://rive.app/docs/game-runtimes/unity/unity)
        - Search for help on the [Rive community forums](https://community.rive.app/)
        - For feature requests, use the [feature request forum](https://community.rive.app/c/feature-requests/) instead

  - type: checkboxes
    id: preflight
    attributes:
      label: Submission checklist
      options:
        - label: I have confirmed the issue is present in the latest version of the Rive Unity package
          required: true
        - label: I have searched the documentation and forums and could not find an answer
          required: true
        - label: I have searched existing issues and this is not a duplicate
          required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What issue are you running into? What's your expected behavior?
      placeholder: Describe the issue you're experiencing
    validations:
      required: true

  - type: input
    id: rive_version_working
    attributes:
      label: Previous working version
      description: Has this ever worked before? If so, which version was it working on?

  - type: textarea
    id: repro-description
    attributes:
      label: Reproduction steps / code
      description: |
        Please provide the most **minimal reproduction** you can. Paste a code snippet if the problem is small enough. Or share a link to a minimal GitHub repository that reproduces the issue.

        Alternatively, you can upload a .zip of your reproduction in the next question.
      placeholder: |
        ```csharp
        // paste your code here
        ```
    validations:
      required: false

  - type: upload
    id: repro-files
    attributes:
      label: Upload your reproduction files / stack trace
      description: |
      
        If your reproduction is more complex, you can upload a .zip of your project. 
        Include a file with your stack trace if available as well if you cannot provide it above.
        Please make sure to include a `README` with instructions on how to run the reproduction.

  - type: upload
    id: riv_file
    attributes:
      label: Source `.riv` / `.rev` file
      description: |
        If you are able, attaching the runtime-exported `.riv` file (and ideally the source `.rev` backup) is immensely helpful for reproducing and fixing the issue quickly.

        Note: Use a ZIP archive to upload `.riv`/`.rev` files (GitHub only supports certain file types). You can also share files privately at support@rive.app.
    validations:
      required: false

  - type: upload
    id: screenshots
    attributes:
      label: Screenshots / video
      description: If applicable, add screenshots or a screen recording to help explain the problem.
    validations:
      required: false

  - type: upload
    id: editor_log
    attributes:
      label: Unity Editor log file
      description: |
        If the issue is a crash or editor error, attaching the Unity Editor log file can be very helpful for diagnosing the problem.

        Note: Use a ZIP archive to upload the log file (GitHub only supports certain file types).
    validations:
      required: false

  - type: input
    id: rive_version
    attributes:
      label: Rive Unity package version
      placeholder: "e.g. 0.4.0"
    validations:
      required: true

  - type: input
    id: unity_version
    attributes:
      label: Unity version
      placeholder: "e.g. 2022.3.62"
    validations:
      required: true

  - type: dropdown
    id: target_platform
    attributes:
      label: Target platform
      options:
        - Windows
        - macOS
        - iOS
        - Android
        - WebGL
        - Linux
        - Other
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Editor OS & version
      description: The OS running the Unity Editor
      placeholder: "e.g. macOS 14.4, Windows 11"
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Any other context about the problem (graphics API, relevant config, frequency of occurrence, etc.).
    validations:
      required: false
